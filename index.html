<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para Meu Amor</title>

<style>
body{
background:linear-gradient(#ffd6ea,#fff0f7);
font-family:Arial;
text-align:center;
padding-top:70px;
overflow:hidden;
}

button{
background:#ff0066;
color:white;
border:none;
padding:18px 35px;
font-size:22px;
border-radius:30px;
}

#carta{
display:none;
background:white;
padding:35px;
max-width:650px;
margin:40px auto;
border-radius:20px;
}

#foto{
display:none;
margin-top:30px;
}

img{
width:300px;
border-radius:25px;
}

.heart{
position:fixed;
font-size:30px;
animation:subir 5s linear forwards;
}

@keyframes subir{
100%{
transform:translateY(-900px);
opacity:0;
}
}
</style>

<script>

function surpresa(){

for(let i=0;i<30;i++){

let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";

heart.style.left=Math.random()*100+"%";
heart.style.bottom="0";

document.body.appendChild(heart);

}

setTimeout(function(){
document.getElementById("carta").style.display="block";
},2000);


setTimeout(function(){
document.getElementById("foto").style.display="block";
},5000);

}

</script>
</head>

<body>

<h1>Para Minha Namorada ❤️</h1>

<button onclick="surpresa()">
Clique aqui amor 💌
</button>


<div id="carta">

<h2>Minha Cartinha 💖</h2>

<p>
Você é a melhor parte dos meus dias.<br><br>

Seu abraço é meu lugar favorito.<br><br>

Te amo infinitamente. ❤️
</p>

</div>


<div id="foto">
<h2>Nós ❤️</h2>

<img src="foto.jpg">

</div>

</body>
</html>
